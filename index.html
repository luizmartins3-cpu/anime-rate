<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Rate - O Melhor Catálogo de Animes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <div class="fade-in">
        <main class="container">
            <!-- Hero Banner -->
            <section class="hero-banner">
                <img src="https://jornalismorio.espm.br/wp-content/uploads/2021/12/confira-agora-os-25-melhores-animes-que-ja-foram-criados-1.jpg" alt="Banner Hero Anime">
                <div class="hero-content">
                    <h1 class="hero-title">Descubra seu próximo anime favorito</h1>
                    <p class="hero-desc">Explore milhares de títulos, avalie suas obras preferidas e organize sua lista personalizada.</p>
                </div>
            </section>

            <!-- Controls (Search and Filters) -->
            <section class="controls-container">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" placeholder="Pesquisar animes...">
                </div>
                <div class="filter-group" id="genre-filters">
                    <div class="filter-btn active" data-genre="all">Todos</div>
                    <div class="filter-btn" data-genre="Ação">Ação</div>
                    <div class="filter-btn" data-genre="Romance">Romance</div>
                    <div class="filter-btn" data-genre="Terror">Terror</div>
                    <div class="filter-btn" data-genre="Shounen">Shounen</div>
                    <div class="filter-btn" data-genre="Isekai">Isekai</div>
                    <div class="filter-btn" data-genre="Comédia">Comédia</div>
                    <div class="filter-btn" data-genre="Drama">Drama</div>
                </div>
            </section>

            <h2 class="section-title">Catálogo Completo</h2>
            
            <!-- Anime Grid -->
            <div class="anime-grid" id="anime-grid">
                <!-- Cards will be rendered here by home.js -->
            </div>

            <!-- Empty State -->
            <div id="empty-state" class="empty-message hidden">
                <i class="fas fa-search-minus fa-3x" style="margin-bottom: 1rem; color: var(--text-muted);"></i>
                <h3>Nenhum anime encontrado</h3>
                <p>Tente ajustar sua pesquisa ou filtros.</p>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/common.js"></script>
    <script src="js/home.js"></script>
</body>
</html>
