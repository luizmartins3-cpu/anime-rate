<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Favoritos - Anime Rate</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">

<body>
    <div class="fade-in">
        <main class="container">
            <h1 class="section-title">Meus Animes Favoritos</h1>

                <p>Navegue pelo catálogo e adicione os animes que você mais gosta!</p>
                <a href="../index.html" class="btn btn-primary" style="margin-top: 1.5rem;">Explorar Catálogo</a>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="../js/data.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/common.js"></script>
