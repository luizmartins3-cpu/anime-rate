<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - Anime Rate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
    <style>
        .auth-container {
            max-width: 450px;
            margin: 4rem auto;
            background: var(--bg-card);
            padding: 2.5rem;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: var(--text-muted);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-light);
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--border-radius);
            color: var(--text-light);
            font-size: 1rem;
            transition: all var(--transition-speed);
        }

        .form-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(125, 42, 232, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        .auth-btn {
            width: 100%;
            margin-top: 1rem;
            padding: 1rem;
            font-size: 1.1rem;
        }

        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .auth-footer a {
            color: var(--primary-color);
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: rgba(232, 42, 42, 0.15);
            color: var(--accent-color);
            padding: 0.8rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            text-align: center;
            font-size: 0.9rem;
            border: 1px solid rgba(232, 42, 42, 0.2);
            display: none;
        }
    </style>
</head>
<body>
    <div class="fade-in">
        <main class="container">
            <div class="auth-container">
                <div class="auth-header">
                    <h1>Entrar</h1>
                    <p>Bem-vindo de volta, otaku!</p>
                </div>

                <div id="error-msg" class="error-message"></div>

                <form id="login-form">
                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" placeholder="seu@email.com" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Senha</label>
                        <input type="password" id="password" placeholder="Sua senha secreta" required>
                    </div>

                    <button type="submit" class="btn btn-primary auth-btn">Entrar</button>
                </form>

                <div class="auth-footer">
                    Ainda não tem conta? <a href="register.html">Criar Conta</a>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="../js/auth.js"></script>
    <script src="../js/common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            AnimeUtils.createNavbar();
            
            const form = document.getElementById('login-form');
            const errorMsg = document.getElementById('error-msg');

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                errorMsg.style.display = 'none';

                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                const result = AnimeAuth.login(email, password);

                if (result.success) {
                    const redirect = AnimeUtils.getUrlParam('redirect');
                    window.location.href = redirect || 'profile.html';
                } else {
                    errorMsg.textContent = result.message;
                    errorMsg.style.display = 'block';
                }
            });
        });
    </script>
</body>
</html>
