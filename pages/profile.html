<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - Anime Rate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
    <style>
        .profile-header {
            background: var(--bg-card);
            padding: 3rem;
            border-radius: var(--border-radius);
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            background: var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: var(--border-radius);
            text-align: center;
            border-bottom: 4px solid var(--primary-color);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            display: block;
        }

        .stat-label {
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .recent-reviews {
            margin-top: 3rem;
        }

        @media (max-width: 600px) {
            .profile-header {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="fade-in">
        <main class="container">
            <div class="profile-header">
                <div class="profile-avatar">
                    <i class="fas fa-user"></i>
                </div>
                <div class="profile-info">
                    <h1>Otaku Explorer</h1>
                    <p style="color: var(--text-muted);">Membro desde 2024</p>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-value" id="count-favorites">0</span>
                    <span class="stat-label">Favoritos</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="count-reviews">0</span>
                    <span class="stat-label">Avaliações</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="user-rank">Iniciante</span>
                    <span class="stat-label">Seu Rank</span>
                </div>
            </div>

            <section class="recent-reviews">
                <h2 class="section-title">Minhas Avaliações Recentes</h2>
                <div id="user-reviews-list">
                    <!-- Reviews will be rendered here -->
                </div>
            </section>
        </main>
    </div>

    <!-- Scripts -->
    <script src="../js/data.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/profile.js"></script>
</body>
</html>
