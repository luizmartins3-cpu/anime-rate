<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Anime - Anime Rate</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
    <style>
        .details-header {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 4rem;
            margin-top: 3rem;
            align-items: start;
        }

        .details-img {
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            border: 1px solid var(--glass-border);
            position: sticky;
            top: 100px;
        }

        .details-img img {
            width: 100%;
            height: auto;
            transition: transform 0.5s ease;
        }

        .details-img:hover img {
            transform: scale(1.05);
        }

        .details-info h1 {
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 1.5rem;
            letter-spacing: -0.05em;
            line-height: 1.1;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .details-meta {
            display: flex;
            gap: 1rem;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            color: var(--text-light);
            background: rgba(255, 255, 255, 0.05);
            padding: 0.6rem 1.25rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }

        .meta-item i {
            color: var(--primary-color);
        }

        .details-description {
            font-size: 1.15rem;
            color: var(--text-muted);
            margin-bottom: 3rem;
            line-height: 1.8;
            max-width: 800px;
        }

        .details-actions {
            display: flex;
            gap: 1.25rem;
            flex-wrap: wrap;
        }

        .trailer-section {
            margin-top: 6rem;
            padding-top: 4rem;
            border-top: 1px solid var(--glass-border);
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 ratio */
            height: 0;
            overflow: hidden;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--glass-border);
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .reviews-section {
            margin-top: 6rem;
            padding-bottom: 4rem;
        }

        .review-card {
            background: var(--bg-card);
            padding: 2rem;
            border-radius: 20px;
            margin-bottom: 1.5rem;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }

        .review-card:hover {
            transform: translateX(10px);
            border-color: var(--primary-color);
        }

        .review-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .review-user {
            font-weight: 700;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .review-user::before {
            content: '';
            width: 32px;
            height: 32px;
            background: var(--primary-color);
            border-radius: 50%;
            display: inline-block;
        }

        .review-date {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        @media (max-width: 1024px) {
            .details-header {
                grid-template-columns: 1fr;
                gap: 3rem;
            }
            
            .details-img {
                max-width: 320px;
                margin: 0 auto;
                position: static;
            }

            .details-info {
                text-align: center;
            }

            .details-info h1 {
                font-size: 2.75rem;
            }

            .details-meta, .details-actions {
                justify-content: center;
            }

            .details-description {
                margin-left: auto;
                margin-right: auto;
            }
        }
    </style>
</head>
<body>
    <div class="fade-in">
        <main class="container" id="details-container">
            <div onclick="window.history.back()" class="back-btn">
                <i class="fas fa-arrow-left"></i> Voltar à Galeria
            </div>

            <!-- Content will be injected by details.js -->
        </main>
    </div>

    <!-- Scripts -->
    <script src="../js/data.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/details.js"></script>
</body>
</html>
