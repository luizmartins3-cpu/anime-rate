<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Anime - Anime Rate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
    <style>
        .details-header {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 3rem;
            margin-top: 2rem;
        }

        .details-img {
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .details-info h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .details-meta {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            background: var(--bg-card);
            padding: 0.5rem 1rem;
            border-radius: 20px;
        }

        .meta-item i {
            color: var(--primary-color);
        }

        .details-description {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
            line-height: 1.8;
        }

        .trailer-section {
            margin-top: 4rem;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 ratio */
            height: 0;
            overflow: hidden;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .reviews-section {
            margin-top: 4rem;
        }

        .review-card {
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: var(--border-radius);
            margin-bottom: 1.5rem;
        }

        .review-meta {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .review-user {
            font-weight: bold;
            color: var(--primary-color);
        }

        @media (max-width: 900px) {
            .details-header {
                grid-template-columns: 1fr;
            }
            
            .details-img {
                max-width: 400px;
                margin: 0 auto;
            }

            .details-info h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="fade-in">
        <main class="container" id="details-container">
            <div onclick="window.history.back()" class="back-btn">
                <i class="fas fa-arrow-left"></i> Voltar
            </div>

            <!-- Content will be injected by details.js -->
        </main>
    </div>

    <!-- Scripts -->
    <script src="../js/data.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/details.js"></script>
</body>
</html>
