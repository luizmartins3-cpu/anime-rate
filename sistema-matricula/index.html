<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Matrícula Elite</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --success: #10b981;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            animation: fadeInUp 0.6s ease-out;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            text-align: center;
            margin-bottom: 8px;
            font-size: 28px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input, select {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            font-size: 15px;
            color: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
            filter: brightness(1.1);
        }

        /* Estilos de Sucesso (Mantidos para referência da View) */
        .success-card {
            border-top: 4px solid var(--success);
            display: none; /* Escondido por padrão na View estática */
        }

        .success-icon-wrapper {
            width: 64px;
            height: 64px;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .success-icon {
            font-size: 32px;
            color: var(--success);
        }

        .info-box {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 20px;
            margin: 24px 0;
            border: 1px solid var(--glass-border);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--glass-border);
        }

        .info-row:last-child { border-bottom: none; }

        .info-label { color: var(--text-muted); font-size: 13px; }
        .info-val { font-weight: 500; font-size: 14px; color: #fff; }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--glass-border);
            margin-top: 12px;
            box-shadow: none;
        }

        .btn-outline:hover {
            background: var(--glass-border);
            box-shadow: none;
        }

        ::placeholder { color: #475569; }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- VIEW: FORMULÁRIO -->
        <div class="card" id="form-card">
            <h1>Sistema Elite</h1>
            <p class="subtitle">Inicie sua jornada acadêmica hoje.</p>
            
            <form action="/" method="POST">
                <div class="form-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" name="nome" placeholder="Ex: Lucas Oliveira" required>
                </div>

                <div class="form-group">
                    <label for="idade">Idade</label>
                    <input type="number" id="idade" name="idade" placeholder="Sua idade" min="16" max="100" required>
                </div>

                <div class="form-group">
                    <label for="curso">Curso Desejado</label>
                    <select id="curso" name="curso" required>
                        <option value="" disabled selected>Escolha uma trilha...</option>
                        <option value="Fullstack Pro">Fullstack Developer Pro</option>
                        <option value="Data Expert">Data Science Expert</option>
                        <option value="UI/UX Master">UI/UX Design Master</option>
                        <option value="Cyber Security">Cyber Security Specialist</option>
                    </select>
                </div>

                <button type="submit">Finalizar Matrícula</button>
            </form>
        </div>

        <!-- VIEW: SUCESSO (Estrutura pronta para ser populada pelo back-end) -->
        <div class="card success-card" id="success-card">
            <div class="success-icon-wrapper">
                <span class="success-icon">✓</span>
            </div>
            <h1>Confirmado!</h1>
            <p class="subtitle">Sua matrícula foi processada com sucesso.</p>

            <div class="info-box">
                <div class="info-row">
                    <span class="info-label">Estudante</span>
                    <span class="info-val" id="res-nome">--</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Idade</span>
                    <span class="info-val" id="res-idade">--</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Curso</span>
                    <span class="info-val" id="res-curso">--</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Protocolo</span>
                    <span class="info-val" id="res-protocolo">#0000</span>
                </div>
            </div>

            <button onclick="window.location.href='/'" class="btn-outline">Voltar ao Início</button>
        </div>

    </div>

</body>
</html>
